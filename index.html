<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridge // TTS Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════
   CSS Variables (Light / Dark)
══════════════════════════════ */
:root {
  --bg:         #56585f;
  --surface:    rgba(255,255,255,0.7);
  --border:     rgba(0,0,0,0.08);
  --accent:     #7dd3fc;
  --accent2:    #f9a8d4;
  --text:       #334155;
  --muted:      #94a3b8;
  --user-bg:    rgba(125,211,252,0.25);
  --char-bg:    rgba(249,168,212,0.25);
  --sidebar-bg: rgba(255,255,255,0.15);
  --input-bg:   rgba(255,255,255,0.7);
  --header-bg:  #050505;
  --card-hover: #24304a;
  --sys-text:   #94a3b8;
  --sidebar-w:  240px;
  --header-h:   48px;
  --input-h:    64px;
  --body-gradient:
    radial-gradient(circle at 20% 20%, rgba(249,168,212,0.25), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(125,211,252,0.25), transparent 40%),
    #f6f8ff;
  --bg-overlay:    linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0.7));
  --bubble-char:   linear-gradient(135deg, rgba(249,168,212,0.25), rgba(249,168,212,0.08));
  --bubble-user:   linear-gradient(135deg, rgba(125,211,252,0.25), rgba(125,211,252,0.08));
  --bubble-base:   linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
}

/* ── Dark Mode ── */
body.dark-mode {
  --bg:         #0d0f14;
  --surface:    rgba(20,24,36,0.85);
  --border:     rgba(255,255,255,0.08);
  --accent:     #38bdf8;
  --accent2:    #f472b6;
  --text:       #cbd5e1;
  --muted:      #475569;
  --user-bg:    rgba(56,189,248,0.15);
  --char-bg:    rgba(244,114,182,0.15);
  --sidebar-bg: rgba(10,13,20,0.75);
  --input-bg:   rgba(15,20,30,0.85);
  --header-bg:  #020305;
  --card-hover: #1a2235;
  --sys-text:   #475569;
  --body-gradient:
    radial-gradient(circle at 20% 20%, rgba(244,114,182,0.12), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(56,189,248,0.12), transparent 40%),
    #0d0f14;
  --bg-overlay:   linear-gradient(to bottom, rgba(0,0,0,0.45), rgba(0,0,0,0.72));
  --bubble-char:  linear-gradient(135deg, rgba(244,114,182,0.18), rgba(244,114,182,0.05));
  --bubble-user:  linear-gradient(135deg, rgba(56,189,248,0.18), rgba(56,189,248,0.05));
  --bubble-base:  linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-weight: 300;
  overflow: hidden;
  font-family: 'Noto Sans JP', sans-serif;
  transition: background .3s, color .3s;
}
body { background: var(--body-gradient); }

/* ── background ── */
#bg-character {
  position: fixed; inset: 0; z-index: 0;
  background-size: cover;
  background-position: center top;
  filter: blur(8px) brightness(0.9);
  opacity: 0.95;
  pointer-events: none;
  transition: opacity .4s, filter .4s;
}
#bg-character.hidden  { opacity: 0; }
#bg-character.no-blur { filter: brightness(0.88); }
#bg-character::after {
  content: "";
  position: absolute; inset: 0;
  background: var(--bg-overlay);
  transition: background .3s;
}

/* ── app shell ── */
#app {
  position: relative; z-index: 1;
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--header-h) 1fr var(--input-h);
  height: 100vh;
  height: 100dvh;
}

/* ── header ── */
#header {
  grid-column: 1 / -1;
  display: flex; align-items: center;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
  background: var(--header-bg);
  transition: background .3s;
}
#header .logo {
  font-family: 'Share Tech Mono', monospace;
  font-size: 15px; color: var(--accent); letter-spacing: .1em;
}
#header .logo span { color: var(--accent2); }
#status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--muted); transition: background .3s; flex-shrink: 0;
}
#status-dot.active  { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
#status-dot.loading { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 1s infinite; }
#status-text {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; color: var(--muted); letter-spacing: .05em;
  flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* モバイル: ハンバーガーボタン */
#menu-btn {
  display: none;
  background: none; border: none; cursor: pointer;
  color: var(--accent); font-size: 20px; padding: 4px 6px;
  flex-shrink: 0;
}

/* ── sidebar ── */
#sidebar {
  grid-row: 2 / 4;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
  backdrop-filter: blur(8px);
  background: var(--sidebar-bg);
  transition: transform .25s ease, background .3s;
}
#char-panel { flex: 1; overflow-y: auto; padding: 12px; }

.sidebar-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; color: var(--muted);
  letter-spacing: .15em; text-transform: uppercase;
  padding: 8px 4px 6px;
}
.sidebar-section-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; color: var(--muted);
  letter-spacing: .12em; text-transform: uppercase;
  padding: 10px 4px 4px;
  border-top: 1px solid var(--border);
  margin-top: 4px;
}

/* コントロール行 */
.sidebar-controls {
  display: flex; flex-direction: column; gap: 6px;
  padding: 4px 4px 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
}
.ctrl-label {
  display: flex; align-items: center; gap: 6px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; color: var(--accent); cursor: pointer;
  user-select: none;
}
.ctrl-label input[type="checkbox"] { accent-color: var(--accent); width: 13px; height: 13px; }
.ctrl-label.disabled { color: var(--muted); cursor: not-allowed; }

/* TTS batch size */
.ctrl-row-num {
  display: flex; align-items: center; gap: 6px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; color: var(--accent);
}
.ctrl-row-num span { flex: 1; }
.ctrl-row-num input[type="number"] {
  width: 48px; padding: 2px 4px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  outline: none;
  text-align: center;
}
.ctrl-row-num input[type="number"]:focus { border-color: var(--accent); }

/* 横並びペア (背景画像 + ぼかし) */
.ctrl-inline-pair {
  display: flex; gap: 12px; align-items: center;
}
.ctrl-inline-pair .ctrl-label { flex: none; }

.char-card {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 6px; cursor: pointer;
  border: 1px solid transparent; transition: all .2s; margin-bottom: 4px;
}
.char-card:hover  { background: var(--card-hover); border-color: var(--border); }
.char-card.active { background: var(--char-bg); border-color: var(--accent); }
.char-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--surface);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 14px; overflow: hidden;
}
.char-avatar img { width: 100%; height: 100%; object-fit: cover; }
.char-name { font-size: 13px; font-weight: 500; color: var(--text); }
.char-sub  { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted); }
.char-sub.no-voice { color: #ff4d4d; font-weight: bold; }

#char-image-area { padding: 10px; border-top: 1px solid var(--border); }
#char-big-img {
  width: 100%; border-radius: 8px;
  border: 1px solid var(--border); display: none;
}

/* ── messages ── */
#messages {
  overflow-y: auto;
  padding: 16px 20px;
  display: flex; flex-direction: column; gap: 16px;
  scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg-row {
  display: flex; gap: 10px;
  animation: fadeUp .3s ease; padding: 6px;
}
.msg-row.user { flex-direction: row-reverse; margin-left: 40px; }
.msg-row.user .msg-avatar { display: none; }

.msg-avatar {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 12px; overflow: hidden;
  box-shadow: 0 0 8px rgba(76,201,240,0.2);
}
.msg-avatar img { width: 100%; height: 100%; object-fit: cover; }

.msg-bubble {
  border-radius: 5px;
  max-width: 75%;
  padding: 10px;
  padding-bottom: 22px;   /* フッター分の余白 */
  backdrop-filter: blur(10px);
  background: var(--bubble-base);
  border: 1px solid rgba(255,255,255,0.2);
  position: relative;     /* フッターの基点 */
}
.msg-row.char .msg-bubble { background: var(--bubble-char); }
.msg-row.user .msg-bubble { background: var(--bubble-user); }
.msg-name {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; color: var(--muted);
  margin-bottom: 4px; letter-spacing: .05em; padding: 0 0 4px;
}
.msg-row.user .msg-name { text-align: right; }
.msg-text { font-size: 14px; line-height: 1.6; }

/* ── 吹き出しフッター (右下) ── */
.bubble-footer {
  position: absolute; bottom: 5px; right: 8px;
  display: flex; align-items: center; gap: 4px;
}

/* 生成中スピナー */
.tts-spinner {
  display: flex; gap: 2px; align-items: flex-end; height: 10px;
}
.tts-spinner span {
  width: 3px; border-radius: 2px;
  background: var(--accent2); opacity: 0.7;
  animation: bar 0.8s ease-in-out infinite;
}
.tts-spinner span:nth-child(1) { animation-delay: 0s; }
.tts-spinner span:nth-child(2) { animation-delay: .15s; }
.tts-spinner span:nth-child(3) { animation-delay: .30s; }

/* 再生ボタン */
.replay-btn {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1px solid var(--accent2);
  background: transparent;
  color: var(--accent2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px;
  padding: 0;
  opacity: 0.7;
  transition: opacity .2s, background .2s;
  flex-shrink: 0;
  line-height: 1;
}
.replay-btn:hover { opacity: 1; background: rgba(249,168,212,0.2); }

.cursor {
  display: inline-block; width: 2px; height: 1em;
  background: var(--accent); margin-left: 2px;
  vertical-align: text-bottom; animation: blink .7s step-end infinite;
}

/* ── input bar ── */
#input-bar {
  grid-column: 2;
  display: flex; align-items: center; gap: 10px;
  padding: 0 16px;
  border-top: 1px solid var(--border);
  background: var(--input-bg);
  backdrop-filter: blur(8px);
  transition: background .3s;
}
#user-input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px; font-weight: 300;
  resize: none; height: 40px; line-height: 40px; padding: 0;
}
#user-input::placeholder { color: var(--muted); }
#send-btn {
  width: 38px; height: 38px; border-radius: 8px;
  border: 1px solid var(--accent); background: transparent;
  color: var(--accent); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; font-size: 16px; flex-shrink: 0;
}
#send-btn:hover   { background: var(--accent); color: var(--bg); }
#send-btn:disabled { opacity: .3; cursor: default; }

/* ── TTS indicator ── */
#tts-indicator {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; color: var(--accent2); letter-spacing: .08em;
  display: none; gap: 4px; align-items: center; flex-shrink: 0;
}
#tts-indicator.show { display: flex; }
.tts-bars { display: flex; gap: 2px; align-items: flex-end; height: 12px; }
.tts-bars span {
  width: 3px; background: var(--accent2); border-radius: 2px;
  animation: bar 0.8s ease-in-out infinite;
}
.tts-bars span:nth-child(2) { animation-delay: .15s; }
.tts-bars span:nth-child(3) { animation-delay: .30s; }

/* ── welcome ── */
#welcome {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  color: var(--muted); font-family: 'Share Tech Mono', monospace;
  font-size: 13px; letter-spacing: .05em;
}
#welcome .big { font-size: 36px; }

/* ── toast ── */
#toast-container {
  position: fixed; top: 20px; right: 20px; z-index: 9999;
  display: flex; flex-direction: column; gap: 10px;
}
.toast {
  min-width: 200px; max-width: 300px;
  padding: 12px 16px; border-radius: 12px;
  background: rgba(255,80,80,0.9); color: white;
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  backdrop-filter: blur(6px); font-size: 14px;
  opacity: 0; transform: translateY(-10px);
  transition: all 0.25s ease;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── overlay ── */
#sidebar-overlay {
  display: none; pointer-events: none;
  position: fixed; inset: 0; z-index: 5;
  background: rgba(0,0,0,0.4);
}

/* ── welcome btn ── */
#welcome-menu-btn {
  display: none; margin-top: 8px;
  padding: 10px 24px; border-radius: 24px;
  border: 1px solid var(--accent); background: transparent;
  color: var(--accent); font-family: 'Share Tech Mono', monospace;
  font-size: 13px; cursor: pointer; letter-spacing: .05em;
  transition: all .2s;
}
#welcome-menu-btn:hover { background: var(--accent); color: #000; }

@media (max-width: 600px) {
  #welcome-menu-btn { display: inline-block; }
}

/* ── 送信バー: そのままTTSチェックボックス ── */
#input-bar .direct-tts-wrap {
  display: flex; align-items: center; flex-shrink: 0;
}
#direct-tts-label {
  display: flex; align-items: center; gap: 4px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; color: var(--muted);
  cursor: pointer; user-select: none; white-space: nowrap;
}
#direct-tts-label input { accent-color: var(--accent2); width: 12px; height: 12px; }
#direct-tts-label.active { color: var(--accent2); }

/* ── システムプロンプトボタン (サイドバー) ── */
#sys-prompt-btn {
  width: 100%; padding: 6px 10px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--accent);
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; letter-spacing: .1em;
  cursor: pointer; text-align: left;
  transition: all .2s;
  display: flex; align-items: center; gap: 6px;
}
#sys-prompt-btn:hover { background: var(--card-hover); border-color: var(--accent); }
#sys-prompt-btn .sys-active-name {
  color: var(--accent2); font-size: 9px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  max-width: 120px;
}

/* ══════════════════════════════
   システムプロンプト モーダル
══════════════════════════════ */
#sys-modal-backdrop {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
#sys-modal-backdrop.open { display: flex; }

#sys-modal {
  width: min(820px, 95vw);
  max-height: 90vh;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(0,0,0,0.4);
}

#sys-modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--header-bg);
  flex-shrink: 0;
}
#sys-modal-header .modal-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px; color: var(--accent); letter-spacing: .1em;
}
#sys-modal-close {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 18px; line-height: 1;
  padding: 2px 6px; border-radius: 4px; transition: color .2s;
}
#sys-modal-close:hover { color: var(--text); }

#sys-modal-body {
  display: flex; flex: 1; overflow: hidden;
  min-height: 0;
}

/* 左: ファイルリスト */
#sys-file-list-pane {
  width: 200px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 8px 0;
  background: var(--sidebar-bg);
}
.sys-file-item {
  padding: 8px 14px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; color: var(--text);
  cursor: pointer; transition: background .15s;
  border-left: 2px solid transparent;
  word-break: break-all;
}
.sys-file-item:hover { background: var(--card-hover); }
.sys-file-item.selected { border-left-color: var(--accent); background: var(--user-bg); color: var(--accent); }
.sys-file-section-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; color: var(--muted);
  letter-spacing: .12em; text-transform: uppercase;
  padding: 10px 14px 4px;
}
.sys-user-slot-item {
  display: flex; align-items: center;
  padding: 6px 10px 6px 14px;
  gap: 4px;
  border-left: 2px solid transparent;
  cursor: pointer; transition: background .15s;
}
.sys-user-slot-item:hover { background: var(--card-hover); }
.sys-user-slot-item.selected { border-left-color: var(--accent2); background: var(--char-bg); }
.sys-user-slot-name {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; color: var(--text); flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sys-user-slot-item.selected .sys-user-slot-name { color: var(--accent2); }

/* 右: プレビュー/編集 */
#sys-preview-pane {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; padding: 14px;
  gap: 8px;
  min-width: 0;
}
#sys-preview-filename {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; color: var(--accent2);
  flex-shrink: 0;
}
#sys-preview-text {
  flex: 1;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px; line-height: 1.6;
  padding: 10px 12px;
  resize: none; outline: none;
  min-height: 0;
  transition: border-color .2s;
}
#sys-preview-text:focus { border-color: var(--accent); }
#sys-preview-text[readonly] { cursor: default; opacity: 0.85; }

/* 下部: オプション + ボタン */
#sys-modal-footer {
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; flex-wrap: wrap; gap: 12px;
  flex-shrink: 0;
  background: var(--sidebar-bg);
}
#sys-after-char-label {
  display: flex; align-items: center; gap: 6px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; color: var(--accent); cursor: pointer;
  user-select: none; flex: 1;
}
#sys-after-char-label input,
#sys-slot-and-file-label input { accent-color: var(--accent); width: 13px; height: 13px; }
#sys-slot-and-file-label {
  display: flex; align-items: center; gap: 6px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; color: var(--accent); cursor: pointer;
  user-select: none;
}
.modal-btn {
  padding: 7px 18px; border-radius: 6px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px; cursor: pointer; transition: all .2s;
  letter-spacing: .05em;
}
.modal-btn.primary {
  background: var(--accent); color: #000; border: 1px solid var(--accent);
}
.modal-btn.primary:hover { opacity: .85; }
.modal-btn.secondary {
  background: transparent; color: var(--muted);
  border: 1px solid var(--border);
}
.modal-btn.secondary:hover { border-color: var(--muted); color: var(--text); }
.modal-btn.save-slot {
  background: transparent; color: var(--accent2);
  border: 1px solid var(--accent2); display: none;
}
.modal-btn.save-slot:hover { background: rgba(249,168,212,0.15); }

@media (max-width: 600px) {
  #sys-file-list-pane { width: 140px; }
  #sys-modal { max-height: 85vh; }
}

@keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }

<script>
/* ═══════════════════════════════════════════
   Bridge WebUI — フロントエンド
   変更点:
   1. iOS音声再生問題の修正 (AudioContext unlock)
   2. TTS文章数設定 (サイドバー + 設定ファイル保存)
   3. 絵文字を直前の文章に結合 (絵文字単体をTTSに送らない)
   4. ダークモード / ぼかしモード (設定ファイル保存)
═══════════════════════════════════════════ */

const API = '';  // 同一オリジン

let selectedIndex    = null;
let selectedName     = '';
let selectedImageUrl = null;
let isGenerating     = false;
let audioQueue       = [];
let isAudioPlaying   = false;

/* ══════════════════════════════
   DOM refs
══════════════════════════════ */
const $charList  = document.getElementById('char-list');
const $messages  = document.getElementById('messages');
const $input     = document.getElementById('user-input');
const $sendBtn   = document.getElementById('send-btn');
const $statusDot = document.getElementById('status-dot');
const $statusTxt = document.getElementById('status-text');
const $ttsInd    = document.getElementById('tts-indicator');
const $bigImg    = document.getElementById('char-big-img');
const $sidebar   = document.getElementById('sidebar');
const $overlay   = document.getElementById('sidebar-overlay');
const $menuBtn   = document.getElementById('menu-btn');
const $bgEl      = document.getElementById('bg-character');
const $bgToggle  = document.getElementById('bg-toggle');
const $ttsToggle = document.getElementById('tts-toggle');
const $darkToggle= document.getElementById('dark-toggle');
const $blurToggle= document.getElementById('blur-toggle');
const $ttsBatch  = document.getElementById('tts-batch-size');
const $directTtsToggle = document.getElementById('direct-tts-toggle');
const $directTtsLabel  = document.getElementById('direct-tts-label');

// システムプロンプト モーダル
const $sysBtn        = document.getElementById('sys-prompt-btn');
const $sysBackdrop   = document.getElementById('sys-modal-backdrop');
const $sysClose      = document.getElementById('sys-modal-close');
const $sysCancelBtn  = document.getElementById('sys-cancel-btn');
const $sysOkBtn      = document.getElementById('sys-ok-btn');
const $sysFileItems  = document.getElementById('sys-file-items');
const $sysSlotItems  = document.getElementById('sys-slot-items');
const $sysPreviewFn  = document.getElementById('sys-preview-filename');
const $sysPreviewTxt = document.getElementById('sys-preview-text');
const $sysAfterChar    = document.getElementById('sys-after-char');
const $sysSlotAndFile  = document.getElementById('sys-slot-and-file');
const $sysSaveSlot     = document.getElementById('sys-save-slot-btn');
const $sysActiveLabel  = document.getElementById('sys-active-label');

/* ══════════════════════════════
   iOS Audio Unlock
   最初のユーザー操作時に AudioContext を
   resume + 無音再生してiOSのブロックを解除する
══════════════════════════════ */
let audioUnlocked = false;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { console.warn('[Audio] AudioContext unavailable:', e); }
  }
  return audioCtx;
}

function unlockAudio() {
  if (audioUnlocked) return;
  const ctx = getAudioCtx();
  if (!ctx) return;

  // 無音バッファを再生
  try {
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
  } catch(e) {}

  const resume = () => {
    audioUnlocked = true;
    console.log('[Audio] Unlocked, state:', ctx.state);
    if (audioQueue.length > 0 && !isAudioPlaying) playNextAudio();
  };

  if (ctx.state === 'suspended') {
    ctx.resume().then(resume).catch(() => { audioUnlocked = true; });
  } else {
    resume();
  }
}

['touchstart', 'touchend', 'mousedown', 'keydown'].forEach(evt => {
  document.addEventListener(evt, unlockAudio, { passive: true });
});

/* ══════════════════════════════
   モバイル サイドバー開閉
══════════════════════════════ */
function openSidebar()  { $sidebar.classList.add('open'); $overlay.classList.add('open'); }
function closeSidebar() { $sidebar.classList.remove('open'); $overlay.classList.remove('open'); }
$menuBtn.addEventListener('click', openSidebar);
$overlay.addEventListener('click', (e) => { if (e.target === $overlay) closeSidebar(); });
$overlay.addEventListener('touchstart', closeSidebar, { passive: true });
$sidebar.addEventListener('click', e => e.stopPropagation());

/* ══════════════════════════════
   設定の読み込み / 保存
══════════════════════════════ */
async function loadSettings() {
  try {
    const res = await fetch(`${API}/settings`);
    if (!res.ok) return;
    const s = await res.json();
    applySettings(s);
  } catch(e) { console.warn('Failed to load settings:', e); }
}

function applySettings(s) {
  if (s.dark_mode !== undefined) {
    $darkToggle.checked = !!s.dark_mode;
    document.body.classList.toggle('dark-mode', !!s.dark_mode);
  }
  if (s.blur_mode !== undefined) {
    $blurToggle.checked = !!s.blur_mode;
    $bgEl.classList.toggle('no-blur', !s.blur_mode);
  }
  if (s.bg_enabled !== undefined) {
    $bgToggle.checked = !!s.bg_enabled;
    $bgEl.classList.toggle('hidden', !s.bg_enabled);
  }
  if (s.tts_enabled !== undefined && !$ttsToggle.disabled) {
    $ttsToggle.checked = !!s.tts_enabled;
  }
  if (s.tts_batch_size !== undefined) {
    $ttsBatch.value = s.tts_batch_size;
  }
  // システムプロンプト設定の反映
  if (s.slot_and_file !== undefined) {
    $sysSlotAndFile.checked = !!s.slot_and_file;
  }
  updateSysActiveLabel(s);
}

async function saveSetting(key, value) {
  try {
    await fetch(`${API}/settings`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ [key]: value }),
    });
  } catch(e) { console.warn('Failed to save setting:', e); }
}

/* ══════════════════════════════
   設定コントロール イベント
══════════════════════════════ */
$bgToggle.addEventListener('change', () => {
  $bgEl.classList.toggle('hidden', !$bgToggle.checked);
  saveSetting('bg_enabled', $bgToggle.checked);
});

$ttsToggle.addEventListener('change', () => {
  saveSetting('tts_enabled', $ttsToggle.checked);
});

$darkToggle.addEventListener('change', () => {
  document.body.classList.toggle('dark-mode', $darkToggle.checked);
  saveSetting('dark_mode', $darkToggle.checked);
});

$blurToggle.addEventListener('change', () => {
  $bgEl.classList.toggle('no-blur', !$blurToggle.checked);
  saveSetting('blur_mode', $blurToggle.checked);
});

$ttsBatch.addEventListener('change', () => {
  const v = parseInt($ttsBatch.value, 10);
  if (!isNaN(v) && v >= 0) saveSetting('tts_batch_size', v);
});
$ttsBatch.addEventListener('input', () => {
  const v = parseInt($ttsBatch.value, 10);
  if (!isNaN(v) && v >= 0) saveSetting('tts_batch_size', v);
});

// 直接TTSトグル
$directTtsToggle.addEventListener('change', () => {
  $directTtsLabel.classList.toggle('active', $directTtsToggle.checked);
  $input.placeholder = $directTtsToggle.checked
    ? 'キャラクターのセリフを入力... (TTSに直接送信)'
    : 'メッセージを入力... (Enter で送信)';
});

/* ══════════════════════════════
   システムプロンプト モーダル
══════════════════════════════ */
let sysModalSelection = { type: null, value: null }; // type: 'file'|'slot', value: filename|slotIndex
let sysModalSlotDirty = false;

function fileDisplayName(fname) {
  if (fname === '__base__') return 'base (default)';
  return (fname || '').replace(/\.txt$/, '');
}

function updateSysActiveLabel(s) {
  if (!s) return;
  const slot  = s.active_user_slot;
  const slots = s.user_slots || [];
  const fname = s.system_prompt_file || '';
  const slotAndFile = !!s.slot_and_file;

  const hasSlot = typeof slot === 'number' && slot >= 0 && slots[slot] && slots[slot].trim();
  const hasFile = !!fname;

  if (slotAndFile && hasSlot && hasFile) {
    $sysActiveLabel.textContent = `${fileDisplayName(fname)} + [スロット${slot + 1}]`;
  } else if (hasSlot) {
    $sysActiveLabel.textContent = `[スロット${slot + 1}]`;
  } else if (hasFile) {
    $sysActiveLabel.textContent = fileDisplayName(fname);
  } else {
    $sysActiveLabel.textContent = '';
  }
}

async function openSysModal() {
  // 現在の設定を取得
  let settings = {};
  try {
    const r = await fetch(`${API}/settings`);
    settings = await r.json();
  } catch(e) {}

  $sysAfterChar.checked    = !!settings.system_prompt_after_char;
  $sysSlotAndFile.checked   = !!settings.slot_and_file;

  // ファイル一覧
  let files = [];
  try {
    const r = await fetch(`${API}/prompts`);
    files = await r.json();
  } catch(e) {}

  // ファイルリスト描画
  $sysFileItems.innerHTML = '';
  if (files.length === 0) {
    $sysFileItems.innerHTML = '<div style="padding:8px 14px;font-family:\'Share Tech Mono\',monospace;font-size:10px;color:var(--muted);">prompts/ にファイルなし</div>';
  }
  files.forEach(fname => {
    const el = document.createElement('div');
    el.className = 'sys-file-item';
    el.textContent = fileDisplayName(fname);
    el.dataset.fname = fname;
    const isActive = settings.active_user_slot === -1 && settings.system_prompt_file === fname;
    if (isActive) {
      el.classList.add('selected');
      sysModalSelection = { type: 'file', value: fname };
    }
    el.addEventListener('click', async () => {
      selectSysItem(el, 'file', fname);
      // ファイル内容プレビュー
      try {
        const r = await fetch(`${API}/prompts/${encodeURIComponent(fname)}`);
        const d = await r.json();
        $sysPreviewFn.textContent = fileDisplayName(fname);
        $sysPreviewTxt.value = d.content;
        $sysPreviewTxt.setAttribute('readonly', '');
        $sysSaveSlot.style.display = 'none';
      } catch(e) { $sysPreviewTxt.value = '[読み込み失敗]'; }
    });
    $sysFileItems.appendChild(el);
  });

  // スロット描画
  const slots = settings.user_slots || ['', '', '', '', ''];
  $sysSlotItems.innerHTML = '';
  slots.forEach((slotText, i) => {
    const el = document.createElement('div');
    el.className = 'sys-user-slot-item';
    const nameEl = document.createElement('span');
    nameEl.className = 'sys-user-slot-name';
    nameEl.textContent = slotText.trim() ? `スロット${i + 1}: ${slotText.slice(0, 16)}…` : `スロット${i + 1} (空)`;
    el.appendChild(nameEl);
    const isActive = settings.active_user_slot === i;
    if (isActive) {
      el.classList.add('selected');
      sysModalSelection = { type: 'slot', value: i };
    }
    el.addEventListener('click', () => {
      selectSysItem(el, 'slot', i);
      $sysPreviewFn.textContent = `ユーザースロット ${i + 1}`;
      $sysPreviewTxt.value = slots[i] || '';
      $sysPreviewTxt.removeAttribute('readonly');
      $sysSaveSlot.style.display = '';
      sysModalSlotDirty = false;
    });
    $sysSlotItems.appendChild(el);
  });

  // 選択済みアイテムのプレビューを即表示
  if (sysModalSelection.type === 'file') {
    // 選択中ファイルの内容を即ロード
    try {
      const r = await fetch(`${API}/prompts/${encodeURIComponent(sysModalSelection.value)}`);
      const d = await r.json();
      $sysPreviewFn.textContent = fileDisplayName(sysModalSelection.value);
      $sysPreviewTxt.value = d.content;
      $sysPreviewTxt.setAttribute('readonly', '');
      $sysSaveSlot.style.display = 'none';
    } catch(e) { $sysPreviewTxt.value = '[読み込み失敗]'; }
  } else if (sysModalSelection.type === 'slot') {
    const slotIdx = sysModalSelection.value;
    $sysPreviewFn.textContent = `ユーザースロット ${slotIdx + 1}`;
    $sysPreviewTxt.value = slots[slotIdx] || '';
    $sysPreviewTxt.removeAttribute('readonly');
    $sysSaveSlot.style.display = '';
  } else {
    $sysPreviewFn.textContent = 'ファイルを選択してください';
    $sysPreviewTxt.value = '';
    $sysPreviewTxt.setAttribute('readonly', '');
    $sysSaveSlot.style.display = 'none';
  }

  $sysBackdrop.classList.add('open');
}

function selectSysItem(el, type, value) {
  document.querySelectorAll('.sys-file-item, .sys-user-slot-item').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  sysModalSelection = { type, value };
}

async function commitSysModal() {
  // スロット編集中なら内容も一緒に保存
  if (sysModalSelection.type === 'slot') {
    await saveCurrentSlot();
  }

  const afterChar    = $sysAfterChar.checked;
  const slotAndFile  = $sysSlotAndFile.checked;
  await saveSetting('system_prompt_after_char', afterChar);
  await saveSetting('slot_and_file', slotAndFile);

  if (sysModalSelection.type === 'file') {
    await saveSetting('system_prompt_file', sysModalSelection.value);
    await saveSetting('active_user_slot', -1);
  } else if (sysModalSelection.type === 'slot') {
    await saveSetting('active_user_slot', sysModalSelection.value);
    // slot_and_file=true の場合はファイル選択を維持、false の場合はクリア
    if (!slotAndFile) {
      await saveSetting('system_prompt_file', '');
    }
  } else {
    await saveSetting('system_prompt_file', '');
    await saveSetting('active_user_slot', -1);
  }

  // ラベル更新のため設定を再取得
  try {
    const r = await fetch(`${API}/settings`);
    updateSysActiveLabel(await r.json());
  } catch(e) { updateSysActiveLabel({}); }

  $sysBackdrop.classList.remove('open');

  // キャラクターが選択済みの場合、会話履歴を保ったままシステムプロンプトだけ即反映
  if (selectedIndex !== null) {
    try {
      const res = await fetch(`${API}/update_system_prompt`, { method: 'POST' });
      if (res.ok) {
        appendSystemMsg('システムプロンプトを更新しました');
      }
    } catch(e) { console.warn('Failed to re-apply system prompt:', e); }
  }
}

async function saveCurrentSlot() {
  if (sysModalSelection.type !== 'slot') return;
  const idx = sysModalSelection.value;
  const text = $sysPreviewTxt.value;

  // 現在のスロット一覧を取得して更新
  let slots = ['', '', '', '', ''];
  try {
    const r = await fetch(`${API}/settings`);
    const s = await r.json();
    slots = s.user_slots || slots;
  } catch(e) {}
  slots[idx] = text;
  await saveSetting('user_slots', slots);

  // スロット名更新
  const nameEl = $sysSlotItems.children[idx]?.querySelector('.sys-user-slot-name');
  if (nameEl) {
    nameEl.textContent = text.trim() ? `スロット${idx + 1}: ${text.slice(0, 16)}…` : `スロット${idx + 1} (空)`;
  }
  sysModalSlotDirty = false;
}

$sysClose.addEventListener('click', () => $sysBackdrop.classList.remove('open'));
$sysCancelBtn.addEventListener('click', () => $sysBackdrop.classList.remove('open'));
$sysOkBtn.addEventListener('click', commitSysModal);
$sysSaveSlot.addEventListener('click', saveCurrentSlot);

/* ══════════════════════════════
   Audio Player (iPhone対応版)
══════════════════════════════ */
function playNextAudio() {
  if (audioQueue.length === 0 || isAudioPlaying) return;

  // AudioContext が suspended の場合は unlock後に再試行
  const ctx = getAudioCtx();
  if (ctx && ctx.state === 'suspended') {
    console.warn('[Audio] suspended — waiting for unlock');
    return;
  }

  isAudioPlaying = true;
  const dataUrl = audioQueue.shift();

  const audio = new Audio();
  audio.preload = 'auto';
  audio.setAttribute('playsinline', '');   // iOS必須

  const onEnd = () => { isAudioPlaying = false; playNextAudio(); };

  let fallbackTimer = null;

  const tryPlay = () => {
    clearTimeout(fallbackTimer);
    audio.oncanplaythrough = null;
    const promise = audio.play();
    if (promise !== undefined) {
      promise.catch(err => {
        console.warn('[Audio] play() blocked:', err.name);
        if (err.name === 'NotAllowedError') {
          // iOSポリシーブロック: キュー先頭に差し戻して次操作を待つ
          audioQueue.unshift(dataUrl);
          isAudioPlaying = false;
          audioUnlocked  = false;
        } else {
          onEnd();
        }
      });
    }
  };

  audio.oncanplaythrough = () => { clearTimeout(fallbackTimer); tryPlay(); };
  fallbackTimer = setTimeout(tryPlay, 3000);  // 3秒フォールバック
  audio.onended = onEnd;
  audio.onerror = () => { clearTimeout(fallbackTimer); onEnd(); };

  audio.src = dataUrl;
  audio.load();
}

/* ══════════════════════════════
   バックグラウンドTTS ポーリング
══════════════════════════════ */
const activePolls = new Map();

/* ══════════════════════════════
   再生ボタンの確定 (スピナー → ▶ ボタン)
══════════════════════════════ */
function finalizeReplayBtn(footer, spinner, collectedAudio) {
  if (!footer) return;
  if (spinner) spinner.style.display = 'none';

  if (collectedAudio.length === 0) return;  // 音声なし → ボタン不要

  const btn = document.createElement('button');
  btn.className = 'replay-btn';
  btn.title = '音声を再生';
  btn.textContent = '\u25B6';  // ▶
  btn.addEventListener('click', () => {
    unlockAudio();
    // 音声を全部キューに積んで再生
    for (const url of collectedAudio) audioQueue.push(url);
    playNextAudio();
  });
  footer.appendChild(btn);
}

function startAudioPolling(reqId, footer, spinner, collectedAudio) {
  if (!reqId || activePolls.has(reqId)) return;

  async function poll() {
    if (!activePolls.has(reqId)) return;
    try {
      const res  = await fetch(`${API}/audio_poll/${reqId}`);
      const data = await res.json();
      for (const b64 of data.audios) {
        const url = 'data:audio/wav;base64,' + b64;
        collectedAudio.push(url);
        audioQueue.push(url);
        playNextAudio();
      }
      if (data.finished) {
        activePolls.delete(reqId);
        finalizeReplayBtn(footer, spinner, collectedAudio);
        return;
      }
    } catch(e) { console.warn('poll error:', e); }
    if (activePolls.has(reqId)) activePolls.set(reqId, setTimeout(poll, 300));
  }

  activePolls.set(reqId, null);
  poll();
}

function stopAudioPolling({ cancel = false } = {}) {
  if (cancel) {
    for (const [reqId, timerId] of activePolls) {
      clearTimeout(timerId);
      fetch(`${API}/audio_poll/${reqId}`, { method: 'DELETE' }).catch(() => {});
    }
    activePolls.clear();
  }
}

Object.defineProperty(window, 'activePollId', {
  get: () => activePolls.size > 0 ? [...activePolls.keys()][0] : null
});

/* ══════════════════════════════
   キャラクター一覧読み込み
══════════════════════════════ */
async function loadCharacters() {
  try {
    const res = await fetch(`${API}/characters`);
    if (!res.ok) throw new Error('サーバーからのデータ取得に失敗しました');
    const list = await res.json();
    $charList.innerHTML = '';

    if (!list || list.length === 0) {
      $charList.innerHTML = '<div id="no-chars">キャラクターが見つかりません</div>';
      return;
    }

    list.forEach(c => {
      const hasVoice = (c.has_voice !== undefined) ? c.has_voice : !c.name.includes('(音声なし)');
      const subText  = hasVoice ? 'voice ready' : 'Voice not ready';
      const subClass = hasVoice ? 'char-sub' : 'char-sub no-voice';

      const card = document.createElement('div');
      card.className = 'char-card';
      card.dataset.index = c.index;
      card.style.position = 'relative';

      const avatarHtml = c.has_image
        ? `<img src="${API}/characters/${c.index}/image" alt="${c.name}">`
        : '&#129302;';

      card.innerHTML = `
        <div class="char-avatar">${avatarHtml}</div>
        <div style="display:flex;flex-direction:column;justify-content:center;flex:1;min-width:0;">
          <div class="char-name">${c.name}</div>
          <div class="${subClass}">${subText}</div>
        </div>
        <button class="char-card-menu-btn" title="オプション" data-idx="${c.index}">•••</button>`;

      card.addEventListener('click', e => {
        if (e.target.closest('.char-card-menu-btn')) return;
        selectCharacter(c.index, c.name, c.has_image, hasVoice);
      });

      // … ボタンクリック
      const menuBtn = card.querySelector('.char-card-menu-btn');
      menuBtn.addEventListener('click', e => {
        e.stopPropagation();
        openCharCardMenu(e, c.index);
      });

      $charList.appendChild(card);
    });

    if (window.innerWidth <= 600 && selectedIndex === null) openSidebar();
  } catch(err) {
    console.error('loadCharacters error:', err);
    $charList.innerHTML = `<div id="no-chars" style="color:red;">エラー: ${err.message}</div>`;
  }
}

   キャラクター選択
══════════════════════════════ */
async function selectCharacter(idx, name, hasImage, hasVoice) {
  const res = await fetch(`${API}/select`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ index: idx }),
  });
  if (!res.ok) return;

  selectedIndex    = idx;
  selectedName     = name;
  selectedImageUrl = hasImage ? `${API}/characters/${idx}/image` : null;

  if (!hasVoice) {
    $ttsToggle.checked  = false;
    $ttsToggle.disabled = true;
  } else {
    $ttsToggle.disabled = false;
    $ttsToggle.checked  = true;
  }

  document.querySelectorAll('.char-card').forEach(c => c.classList.remove('active'));
  const activeCard = document.querySelector(`.char-card[data-index="${idx}"]`);
  if (activeCard) activeCard.classList.add('active');

  if (hasImage) { $bigImg.src = selectedImageUrl; $bigImg.style.display = 'block'; }
  else          { $bigImg.style.display = 'none'; }

  stopAudioPolling({ cancel: true });
  audioQueue.length = 0;
  isAudioPlaying = false;

  $messages.innerHTML = '';
  appendSystemMsg(`${name} がログインしました`);
  setBackgroundImage(selectedImageUrl);
  runInitialGreeting($ttsToggle.checked);

  setTimeout(closeSidebar, 150);
  $sendBtn.disabled = false;
  $input.focus();
}

function appendSystemMsg(text) {
  const div = document.createElement('div');
  div.style.cssText = 'text-align:center;font-family:\'Share Tech Mono\',monospace;font-size:11px;color:var(--sys-text);letter-spacing:.05em;padding:4px 0;';
  div.textContent = `\u2500\u2500 ${text} \u2500\u2500`;
  $messages.appendChild(div);

}

function setBackgroundImage(url) {

  $bgEl.style.backgroundImage = `url(${url})`;
  $bgEl.classList.toggle('hidden', !$bgToggle.checked);

function appendMessage(role, name, imageUrl) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  if (imageUrl) {
    const img = document.createElement('img'); img.src = imageUrl; avatar.appendChild(img);
  } else {
    avatar.textContent = role === 'user' ? '\uD83D\uDC64' : '\uD83E\uDD16';
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  // 名前行
  const nameEl = document.createElement('div');
  nameEl.className = 'msg-name';
  nameEl.textContent = name;
  bubble.appendChild(nameEl);

  // テキスト行
  const textEl = document.createElement('div');
  textEl.className = 'msg-text';
  bubble.appendChild(textEl);

  // フッター（右下のスピナー/再生ボタン領域）- charメッセージのみ
  let footer = null;
  let spinner = null;
  if (role === 'char') {
    footer = document.createElement('div');
    footer.className = 'bubble-footer';

    spinner = document.createElement('div');
    spinner.className = 'tts-spinner';
    spinner.innerHTML = '<span></span><span></span><span></span>';
    spinner.style.display = 'none';  // 最初は非表示（TTS ON時にconsueStream側でflexにする）

    footer.appendChild(spinner);
    bubble.appendChild(footer);
  }

  if (role === 'user') { row.appendChild(bubble); row.appendChild(avatar); }
  else                 { row.appendChild(avatar);  row.appendChild(bubble); }

  $messages.appendChild(row);
  scrollBottom();

  return { textEl, footer, spinner, bubble };
}

function scrollBottom() { $messages.scrollTop = $messages.scrollHeight; }

/* ══════════════════════════════
   ステータス更新
══════════════════════════════ */
function setStatus(state, text) {
  $statusDot.className = state === 'active' ? 'active' : state === 'loading' ? 'loading' : '';
  $statusTxt.textContent = text;
}

/* ══════════════════════════════
   SSEストリーム処理 (共通)
   bubbleRefs = { textEl, footer, spinner, bubble }
══════════════════════════════ */
async function consumeStream(response, bubbleRefs, cursorEl) {
  const { textEl, footer, spinner } = bubbleRefs;
  const reader  = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer    = '';
  let reqId     = null;
  const collectedAudio = [];   // この吹き出しに紐付く音声を収集

  // TTS生成中はスピナー表示
  if (spinner) spinner.style.display = 'flex';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      let data;
      try { data = JSON.parse(line.slice(6)); } catch { continue; }

      if (data.audio) {
        const dataUrl = 'data:audio/wav;base64,' + data.audio;
        collectedAudio.push(dataUrl);
        audioQueue.push(dataUrl);
        playNextAudio();
      }
      if (data.token) {
        cursorEl.remove();
        textEl.insertAdjacentText('beforeend', data.token);
        textEl.appendChild(cursorEl);
        scrollBottom();
      }
      if (data.done) {
        cursorEl.remove();
        reqId = data.req_id || null;
      }
      if (data.error) {
        cursorEl.remove();
        textEl.insertAdjacentText('beforeend', `\n[エラー: ${data.error}]`);
        showErrorToast(data.error);
      }
    }
  }

  // ポーリングで届く音声も収集して再生ボタンに反映
  return { reqId, collectedAudio, footer, spinner };
}

/* ══════════════════════════════
   送信
══════════════════════════════ */
async function sendMessage() {
  if (isGenerating || selectedIndex === null) return;

  unlockAudio();
  stopAudioPolling();

  const text = $input.value;
  $input.value = '';

  const ttsEnabled = $ttsToggle ? $ttsToggle.checked : false;

  // ── 直接TTSモード ──
  if ($directTtsToggle.checked) {
    if (!text.trim()) return;  // 直接TTSは空テキスト不可
    const charRefs = appendMessage('char', selectedName, selectedImageUrl);
    charRefs.textEl.textContent = text.trim();

    if (ttsEnabled && selectedIndex !== null) {
      isGenerating = true;
      setStatus('loading', 'TTS生成中...');
      if (charRefs.spinner) charRefs.spinner.style.display = 'flex';

      const req_id = `direct_${Date.now()}`;
      try {
        const res = await fetch(`${API}/tts_direct`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: text.trim() }),
        });
        if (res.ok) {
          const data = await res.json();
          if (data.audio) {
            const url = 'data:audio/wav;base64,' + data.audio;
            audioQueue.push(url);
            playNextAudio();
            finalizeReplayBtn(charRefs.footer, charRefs.spinner, [url]);
          } else {
            if (charRefs.spinner) charRefs.spinner.style.display = 'none';
          }
        } else {
          if (charRefs.spinner) charRefs.spinner.style.display = 'none';
        }
      } catch(e) {
        showErrorToast('直接TTS失敗: ' + e.message);
        if (charRefs.spinner) charRefs.spinner.style.display = 'none';
      }
      isGenerating = false;
      setStatus('active', `${selectedName} と接続中`);
    }
    return;
  }

  // ── 通常モード ──
  isGenerating = true;
  setStatus('loading', '生成中...');

  if (text.trim()) {
    const { textEl: userTextEl } = appendMessage('user', 'あなた', null);
    userTextEl.textContent = text.trim();
  }

  const charRefs = appendMessage('char', selectedName, selectedImageUrl);
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  charRefs.textEl.appendChild(cursor);

  $ttsInd.classList.add('show');

  try {
    const res = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, tts_enabled: ttsEnabled }),
    });

    const { reqId, collectedAudio, footer, spinner } =
      await consumeStream(res, charRefs, cursor);

    isGenerating = false;
    $sendBtn.disabled = false;
    setStatus('active', `${selectedName} と接続中`);
    $input.focus();

    if (reqId) {
      startAudioPolling(reqId, footer, spinner, collectedAudio);
    } else {
      finalizeReplayBtn(footer, spinner, collectedAudio);
      $ttsInd.classList.remove('show');
    }
  } catch(e) {
    if (cursor.parentNode) cursor.remove();
    charRefs.textEl.insertAdjacentText('beforeend', `\n[通信エラー: ${e.message}]`);
  } finally {
    isGenerating = false;
    $sendBtn.disabled = false;
    setStatus('active', `${selectedName} と接続中`);
    $input.focus();
  }
}

/* ══════════════════════════════
   初回挨拶
══════════════════════════════ */
async function runInitialGreeting(ttsEnabled) {
  if (selectedIndex === null) return;

  isGenerating = true;
  setStatus('loading', '挨拶生成中...');

  const charRefs = appendMessage('char', selectedName, selectedImageUrl);
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  charRefs.textEl.appendChild(cursor);

  try {
    const res = await fetch(`${API}/initial_greeting?tts_enabled=${ttsEnabled}`);
    const { reqId, collectedAudio, footer, spinner } =
      await consumeStream(res, charRefs, cursor);
    isGenerating = false;
    $sendBtn.disabled = false;
    setStatus('active', `${selectedName} と接続中`);
    if (reqId) {
      startAudioPolling(reqId, footer, spinner, collectedAudio);
    } else {
      finalizeReplayBtn(footer, spinner, collectedAudio);
      $ttsInd.classList.remove('show');
    }
  } catch(e) {
    if (cursor.parentNode) cursor.remove();
    charRefs.textEl.textContent = `[通信エラー: ${e.message}]`;
  }

  isGenerating = false;
  $sendBtn.disabled = false;
  setStatus('active', `${selectedName} と接続中`);
}

/* ══════════════════════════════
   Toast
══════════════════════════════ */
function showErrorToast(message, type = 'error') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  if (type === 'success') toast.style.background = 'rgba(34,197,94,0.9)';
  toast.textContent = message;
  container.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 250);
  }, 3000);
}

/* ══════════════════════════════
   起動
══════════════════════════════ */
loadSettings().then(() => loadCharacters());

/* ══════════════════════════════
   キャラクター作成/編集モーダル
══════════════════════════════ */
let charEditMode   = 'create'; // 'create' | 'edit'
let charEditTarget = null;     // 編集対象のindex

const $ceBackdrop = document.getElementById('char-edit-backdrop');
const $ceTitle    = document.getElementById('char-edit-title');
const $ceName     = document.getElementById('ce-name');
const $cePrompt   = document.getElementById('ce-prompt');
const $ceImageLbl = document.getElementById('ce-image-label');
const $ceImageInp = document.getElementById('ce-image-input');
const $ceVoiceLbl = document.getElementById('ce-voice-label');
const $ceVoiceInp = document.getElementById('ce-voice-input');

document.getElementById('ce-image-btn').addEventListener('click', () => $ceImageInp.click());
document.getElementById('ce-voice-btn').addEventListener('click', () => $ceVoiceInp.click());
$ceImageInp.addEventListener('change', () => {
  $ceImageLbl.textContent = $ceImageInp.files[0]?.name || '未選択';
});
$ceVoiceInp.addEventListener('change', () => {
  $ceVoiceLbl.textContent = $ceVoiceInp.files[0]?.name || '未選択';
});

function openCharEditModal(mode, idx = null) {
  charEditMode   = mode;
  charEditTarget = idx;
  $ceName.value     = '';
  $cePrompt.value   = '';
  $ceImageLbl.textContent = '未選択';
  $ceVoiceLbl.textContent = '未選択';
  $ceImageInp.value = '';
  $ceVoiceInp.value = '';

  if (mode === 'create') {
    $ceTitle.textContent = '✦ NEW CHARACTER';
  } else {
    $ceTitle.textContent = '✦ EDIT CHARACTER';
    // 既存データを取得してフォームに反映
    fetch(`${API}/characters/${idx}/info`)
      .then(r => r.json())
      .then(d => {
        $ceName.value   = d.name;
        $cePrompt.value = d.prompt;
        if (d.has_image) $ceImageLbl.textContent = '（既存ファイル）';
        if (d.has_voice) $ceVoiceLbl.textContent = '（既存ファイル）';
      })
      .catch(() => {});
  }

  $ceBackdrop.classList.add('open');
}

document.getElementById('char-edit-cancel').addEventListener('click', () => $ceBackdrop.classList.remove('open'));

document.getElementById('char-edit-ok').addEventListener('click', async () => {
  const name   = $ceName.value.trim();
  const prompt = $cePrompt.value.trim();
  if (!name)   { showErrorToast('キャラクター名を入力してください'); return; }
  if (!prompt) { showErrorToast('プロンプトを入力してください'); return; }

  const fd = new FormData();
  fd.append('name',   name);
  fd.append('prompt', prompt);
  if ($ceImageInp.files[0]) fd.append('image', $ceImageInp.files[0]);
  if ($ceVoiceInp.files[0]) fd.append('voice', $ceVoiceInp.files[0]);

  try {
    let url = charEditMode === 'create'
      ? `${API}/characters/create`
      : `${API}/characters/${charEditTarget}/edit`;
    const res = await fetch(url, { method: 'POST', body: fd });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      showErrorToast(d.detail || '保存に失敗しました');
      return;
    }
    $ceBackdrop.classList.remove('open');
    await loadCharacters();
    showErrorToast('✓ 保存しました', 'success');
  } catch(e) {
    showErrorToast('通信エラー: ' + e.message);
  }
});

// 新規キャラボタン
document.getElementById('new-char-btn').addEventListener('click', () => openCharEditModal('create'));

/* ── キャラカード … メニュー ── */
let activeDropdown = null;

function closeCharCardMenu() {
  if (activeDropdown) { activeDropdown.remove(); activeDropdown = null; }
}
document.addEventListener('click', closeCharCardMenu);

function openCharCardMenu(e, idx) {
  e.stopPropagation();
  closeCharCardMenu();

  const dropdown = document.createElement('div');
  dropdown.className = 'char-card-dropdown';

  const items = [
    { icon: '✏', label: '編集',   action: () => openCharEditModal('edit', idx) },
    { icon: '⧉', label: '複製',   action: () => duplicateChar(idx) },
  ];

  items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'char-card-dropdown-item';
    el.innerHTML = `<span>${item.icon}</span><span>${item.label}</span>`;
    el.addEventListener('click', e2 => {
      e2.stopPropagation();
      closeCharCardMenu();
      item.action();
    });
    dropdown.appendChild(el);
  });

  // ボタン位置の直下に表示
  const rect = e.currentTarget.getBoundingClientRect();
  dropdown.style.position = 'fixed';
  dropdown.style.top  = (rect.bottom + 4) + 'px';
  dropdown.style.left = Math.max(4, rect.left - 60) + 'px';
  document.body.appendChild(dropdown);
  activeDropdown = dropdown;
}

async function duplicateChar(idx) {
  try {
    const res = await fetch(`${API}/characters/${idx}/duplicate`, { method: 'POST' });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      showErrorToast(d.detail || '複製に失敗しました');
      return;
    }
    const d = await res.json();
    await loadCharacters();
    showErrorToast(`✓ 複製しました: ${d.name}`, 'success');
  } catch(e) {
    showErrorToast('複製エラー: ' + e.message);
  }
}
</script>
</body>
</html>
